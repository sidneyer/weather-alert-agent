location:
  name: "Norfolk, VA"
  latitude: 36.8508
  longitude: -76.2859

alerts:
  include: []

notifications:
  stdout:
    enabled: true

  matrix:
    enabled: true
    homeserver: "https://matrix.example.com"
    room_id: "!roomid:matrix.example.com"
    access_token_env: "MATRIX_ACCESS_TOKEN"
  
  ntfy:
    enabled: false
    server: "https://ntfy.sh"
    topic: ""
    topic_env: "NTFY_TOPIC"
    token_env: "NTFY_TOKEN"
    priority: 4
    tags: "warning,weather" 

rss:
  enabled: true
  output_path: "./weather-alerts.xml"
  title: "Local Weather Alerts"
  link: "https://example.com/weather-alerts.xml"
  description: "Local NWS weather alerts"
  max_items: 50
